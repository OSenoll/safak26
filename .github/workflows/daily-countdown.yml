name: Daily military countdown

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-countdown:
    runs-on: ubuntu-latest
    env:
      END_DATE: "2026-07-01"
      TIME_ZONE: "Europe/Istanbul"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update countdown
        id: countdown
        run: node scripts/update-countdown.mjs

      - name: Commit daily update
        if: steps.countdown.outputs.should_commit == 'true'
        run: |
          git config user.name "${{ github.repository_owner }}"
          git config user.email "${{ github.repository_owner_id }}+${{ github.repository_owner }}@users.noreply.github.com"

          git add countdown.md

          if git diff --cached --quiet; then
            echo "No countdown changes to commit."
            exit 0
          fi

          git commit -m "${{ steps.countdown.outputs.commit_message }}"
          git push

